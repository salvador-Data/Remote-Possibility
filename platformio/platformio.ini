; Remote Possibility — M5 Cardputer universal remote (IR + RF + CC1101)
; Build:  cd platformio && py -m platformio run -e m5stack-cardputer
; Package: .pio/build/m5stack-cardputer/firmware.bin → remote_possibility.bin

[env:m5stack-cardputer]
platform = espressif32 @ ^6.9.0
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
build_flags =
    -std=gnu++17
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DIR_TX_PIN=44
    -DIR_RX_PIN=1
    -DRF_TX_PIN=43
    -DRF_RX_PIN=2
    -DCC1101_CS=8
    -DCC1101_SCK=36
    -DCC1101_MISO=37
    -DCC1101_MOSI=35
    -DCC1101_GDO0=9
    -DRP_ENABLE_CC1101=0
lib_deps =
    m5stack/M5Cardputer@^1.0.2
    IRremote@^4.7.1
    sui77/rc-switch@^2.6.4
